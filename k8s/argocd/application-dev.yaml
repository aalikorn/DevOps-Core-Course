---
# ArgoCD Application — DEVELOPMENT environment
# Auto-sync + self-heal + prune enabled so the cluster always
# reflects Git exactly. Any drift (kubectl scale, kubectl edit, …)
# will be reverted automatically by ArgoCD within the reconciliation
# window (~3 minutes, or immediately on Git webhook).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-app-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    env: dev
    app.kubernetes.io/name: python-app
    app.kubernetes.io/part-of: devops-core-course
spec:
  project: default

  source:
    repoURL: https://github.com/aalikorn/DevOps-Core-Course.git
    targetRevision: lab13
    path: k8s/devops-python-app
    helm:
      releaseName: python-app-dev
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    # Automated sync — the defining feature of GitOps for dev.
    automated:
      prune: true        # delete resources removed from Git
      selfHeal: true     # revert drifted cluster state
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
