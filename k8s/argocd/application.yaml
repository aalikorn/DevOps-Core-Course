---
# ArgoCD Application for the main (single-environment) deployment
# This Application manages the devops-python-app Helm chart.
# Sync policy is manual initially so the GitOps workflow can be
# observed step-by-step in the ArgoCD UI (drift detection → sync).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-app
  namespace: argocd
  # Finalizer ensures that when the Application is deleted ArgoCD
  # also removes the managed resources from the cluster.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: python-app
    app.kubernetes.io/part-of: devops-core-course
spec:
  project: default

  # Source: where the Helm chart lives.
  source:
    repoURL: https://github.com/aalikorn/DevOps-Core-Course.git
    targetRevision: lab13
    path: k8s/devops-python-app
    helm:
      valueFiles:
        - values.yaml
      # Release name visible to Helm (also used in templates).
      releaseName: python-app

  # Destination: which cluster and namespace to deploy into.
  destination:
    server: https://kubernetes.default.svc
    namespace: default

  # Manual sync — trigger via UI or `argocd app sync python-app`.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
