---
# ArgoCD Application — PRODUCTION environment
# Manual sync only. Changes in Git are shown as "OutOfSync" in the
# UI but are NOT applied until a human reviews and clicks "Sync"
# (or runs `argocd app sync python-app-prod`). This gives controlled
# release windows, change review, and rollback planning.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-app-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    env: prod
    app.kubernetes.io/name: python-app
    app.kubernetes.io/part-of: devops-core-course
spec:
  project: default

  source:
    repoURL: https://github.com/aalikorn/DevOps-Core-Course.git
    targetRevision: lab13
    path: k8s/devops-python-app
    helm:
      releaseName: python-app-prod
      valueFiles:
        - values.yaml
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  # NOTE: no `automated:` block → manual sync required.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
