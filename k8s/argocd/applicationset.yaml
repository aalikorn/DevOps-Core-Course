---
# Bonus Task: ApplicationSet
# A single template generates both dev and prod Applications using
# the List generator. Parameters per environment (namespace, values
# file, auto-sync flag) are injected into the template via Go
# templating (`{{ .env }}`, `{{ .namespace }}`, ...).
#
# NOTE: `goTemplate: true` + `goTemplateOptions: ["missingkey=error"]`
# gives a real Go-template engine, which is required for the
# conditional `syncPolicy` block used below.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: python-app-set
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  generators:
    - list:
        elements:
          - env: dev
            namespace: dev
            valuesFile: values-dev.yaml
            autoSync: "true"
          - env: prod
            namespace: prod
            valuesFile: values-prod.yaml
            autoSync: "false"

  template:
    metadata:
      name: 'python-app-{{ .env }}'
      namespace: argocd
      labels:
        env: '{{ .env }}'
        app.kubernetes.io/part-of: devops-core-course
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/aalikorn/DevOps-Core-Course.git
        targetRevision: lab13
        path: k8s/devops-python-app
        helm:
          releaseName: 'python-app-{{ .env }}'
          valueFiles:
            - values.yaml
            - '{{ .valuesFile }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        {{- if eq .autoSync "true" }}
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        {{- end }}
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PrunePropagationPolicy=foreground
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
