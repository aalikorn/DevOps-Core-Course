# Default values for devops-python-app
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 3

# Secrets configuration
secrets:
  enabled: true
  data:
    # Placeholder values - override these during deployment
    DB_USERNAME: "placeholder_user"
    DB_PASSWORD: "placeholder_pass"
    API_KEY: "placeholder_key"

image:
  repository: dashnik/devops-info-service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
    - ALL

service:
  type: NodePort
  port: 80
  targetPort: 5001
  nodePort: 30080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: 5001
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 5001
  initialDelaySeconds: 5
  periodSeconds: 3
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Application-specific environment variables
env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "5001"
  - name: DEBUG
    value: "false"
  - name: VISITS_FILE
    value: "/data/visits"

# Strategy for rolling updates
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# ConfigMap configuration (injected as environment variables via envFrom)
config:
  appName: "devops-info-service"
  environment: "production"
  logLevel: "INFO"

# Persistent Volume configuration
persistence:
  enabled: true
  size: 100Mi
  accessMode: ReadWriteOnce
  # storageClass: ""  # Use default storage class

# Vault integration
vault:
  enabled: false
  role: "devops-python-app"
  secretPath: "secret/data/devops-python-app/config"
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/agent-inject-secret-config: "secret/data/devops-python-app/config"
    vault.hashicorp.com/role: "devops-python-app"
  # Template for rendering secrets
  template: |
    {{- with secret "secret/data/devops-python-app/config" -}}
    export DB_USERNAME="{{ .Data.data.username }}"
    export DB_PASSWORD="{{ .Data.data.password }}"
    export API_KEY="{{ .Data.data.api_key }}"
    {{- end -}}
