{{- if .Values.initContainers.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "devops-python-app.fullname" . }}-init
  labels:
    {{- include "devops-python-app.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "devops-python-app.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "devops-python-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devops-python-app.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: init-download
          image: busybox:1.36
          command: ['sh', '-c', 'wget -O /work-dir/welcome.html https://raw.githubusercontent.com/aalikorn/DevOps-Core-Course/main/docs/welcome.txt']
          volumeMounts:
            - name: workdir
              mountPath: /work-dir
        - name: wait-for-service
          image: busybox:1.36
          command: ['sh', '-c', 'until nslookup {{ include "devops-python-app.fullname" . }}-headless; do echo "Waiting for headless service..."; sleep 2; done']
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          volumeMounts:
            - name: workdir
              mountPath: /data/init
            - name: data
              mountPath: /data
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
      volumes:
        - name: workdir
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "devops-python-app.fullname" . }}-data-{{ .Release.Revision }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
{{- end }}