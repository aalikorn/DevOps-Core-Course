apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-python-app.fullname" . }}-pre-install"
  labels:
    {{- include "devops-python-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: pre-install-hook
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: "{{ include "devops-python-app.fullname" . }}-pre-install"
      labels:
        {{- include "devops-python-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pre-install-hook
    spec:
      restartPolicy: Never
      containers:
      - name: pre-install-job
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "=========================================="
          echo "Pre-install hook for {{ include "devops-python-app.fullname" . }}"
          echo "=========================================="
          echo ""
          echo "Release: {{ .Release.Name }}"
          echo "Namespace: {{ .Release.Namespace }}"
          echo "Chart: {{ .Chart.Name }}-{{ .Chart.Version }}"
          echo "App Version: {{ .Chart.AppVersion }}"
          echo ""
          echo "Performing pre-installation checks..."
          echo "✓ Checking namespace exists"
          echo "✓ Validating configuration"
          echo "✓ Preparing environment"
          echo ""
          sleep 5
          echo "Pre-installation checks completed successfully!"
          echo "Ready to deploy application..."
