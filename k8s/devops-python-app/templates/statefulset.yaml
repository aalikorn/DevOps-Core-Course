{{- if .Values.statefulset.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "devops-python-app.fullname" . }}
  labels:
    {{- include "devops-python-app.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "devops-python-app.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "devops-python-app.selectorLabels" . | nindent 6 }}
  {{- if .Values.statefulset.updateStrategy }}
  updateStrategy:
    {{- toYaml .Values.statefulset.updateStrategy | nindent 4 }}
  {{- end }}
  {{- if .Values.statefulset.podManagementPolicy }}
  podManagementPolicy: {{ .Values.statefulset.podManagementPolicy }}
  {{- end }}
  template:
    metadata:
      annotations:
        # Trigger pod restart when ConfigMap changes (hot reload)
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.vault.enabled }}
        {{- range $key, $value := .Values.vault.annotations }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
        {{- if .Values.vault.template }}
        vault.hashicorp.com/agent-inject-template-config: |
{{ .Values.vault.template | indent 10 }}
        {{- end }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "devops-python-app.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "devops-python-app.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        {{- if or .Values.env .Values.secrets.enabled }}
        env:
          {{- if .Values.env }}
          {{- toYaml .Values.env | nindent 10 }}
          {{- end }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ include "devops-python-app.fullname" . }}-env
        {{- if and .Values.secrets.enabled (not .Values.vault.enabled) }}
        - secretRef:
            name: {{ include "devops-python-app.fullname" . }}-secret
        {{- end }}
        volumeMounts:
        - name: config-volume
          mountPath: /config
          readOnly: true
        - name: data
          mountPath: /data
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: config-volume
        configMap:
          name: {{ include "devops-python-app.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        {{- include "devops-python-app.labels" . | nindent 8 }}
    spec:
      accessModes: 
        - {{ .Values.persistence.accessMode }}
      {{- if .Values.persistence.storageClass }}
      storageClassName: {{ .Values.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.persistence.size }}
{{- end }}
