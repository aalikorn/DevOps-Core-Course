{{- if and .Values.rollout.enabled (eq .Values.rollout.strategy "blueGreen") }}
# Preview service for Blue-Green deployment.
# This service routes traffic to the NEW (green) version during a rollout,
# allowing testing before promoting to production (active service).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-python-app.fullname" . }}-preview
  labels:
    {{- include "devops-python-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: preview
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
    {{- if and (eq .Values.service.type "NodePort") .Values.rollout.blueGreen.previewNodePort }}
    nodePort: {{ .Values.rollout.blueGreen.previewNodePort }}
    {{- end }}
  selector:
    {{- include "devops-python-app.selectorLabels" . | nindent 4 }}
{{- end }}
