apiVersion: v1
kind: Service
metadata:
  name: devops-python-service
  labels:
    app: devops-python-app
spec:
  type: NodePort
  selector:
    app: devops-python-app
  ports:
  - protocol: TCP
    port: 80          # Service port (internal cluster)
    targetPort: 5001  # Container port
    nodePort: 30080   # External access port (30000-32767 range)
    name: http
  sessionAffinity: None
