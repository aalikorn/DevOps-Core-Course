name: Ansible Deployment

on:
  push:
    branches: [ master ]
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install "ansible>=9.0.0" ansible-lint

      - name: Run ansible-lint
        working-directory: ./ansible
        run: |
          ansible-lint playbooks/*.yml

  deploy:
    name: Deploy with Ansible
    needs: lint
    runs-on: ubuntu-latest

    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible>=9.0.0"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Prepare Ansible inventory
        working-directory: ./ansible
        run: |
          cat > inventory/hosts.ini <<EOF
          [webservers]
          target ansible_host=${VM_HOST} ansible_user=${VM_USER}
          EOF

      - name: Run provision playbook
        working-directory: ./ansible
        run: |
          echo "$ANSIBLE_VAULT_PASSWORD" > /tmp/vault_pass
          ansible-playbook playbooks/provision.yml \
            --vault-password-file /tmp/vault_pass

      - name: Run deploy playbook
        working-directory: ./ansible
        run: |
          echo "$ANSIBLE_VAULT_PASSWORD" > /tmp/vault_pass
          ansible-playbook playbooks/deploy.yml \
            --vault-password-file /tmp/vault_pass
          rm -f /tmp/vault_pass

      - name: Verify deployment
        run: |
          sleep 10
          curl -f "http://${VM_HOST}:8000" || exit 1
          curl -f "http://${VM_HOST}:8000/health" || exit 1

