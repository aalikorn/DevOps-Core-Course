---
# Web app deployment role with Docker Compose (Lab 6 Task 2)

# Wipe logic runs first (when explicitly requested)
- name: Include wipe tasks
  include_tasks: wipe.yml
  tags:
    - web_app_wipe

# Docker login and deployment
- name: Deploy application with Docker Compose
  block:
    - name: Login to Docker Hub
      docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
        registry_url: https://index.docker.io/v1/
      no_log: true

    - name: Create application directory
      file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Template docker-compose file
      template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: '0644'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Pull latest Docker image
      docker_image:
        name: "{{ docker_image }}"
        tag: "{{ docker_tag }}"
        source: pull
        force_source: yes

    - name: Deploy with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: always
        recreate: smart
      register: compose_output

    - name: Wait for application to be ready
      wait_for:
        host: localhost
        port: "{{ app_port }}"
        delay: 5
        timeout: 60
        state: started

    - name: Verify application health
      uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        status_code: 200
      register: health_check
      retries: 3
      delay: 5
      until: health_check.status == 200

    - name: Display deployment status
      debug:
        msg: "Application {{ app_name }} deployed successfully and is healthy"

  rescue:
    - name: Handle deployment failure
      debug:
        msg: "Deployment failed for {{ app_name }}. Check logs with: docker-compose -f {{ compose_project_dir }}/docker-compose.yml logs"

    - name: Show container status
      command: docker ps -a
      register: container_status
      changed_when: false

    - name: Display container status
      debug:
        var: container_status.stdout_lines

    - name: Fail the playbook
      fail:
        msg: "Application deployment failed"

  become: true
  tags:
    - app_deploy
    - compose
