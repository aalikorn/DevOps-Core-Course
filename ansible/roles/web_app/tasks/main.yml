---
# Web app deployment role with Docker Compose (Lab 6 Task 2)

# Wipe logic runs first (when explicitly requested)
- name: Include wipe tasks
  ansible.builtin.include_tasks: wipe.yml
  tags:
    - web_app_wipe

# Docker login and deployment
- name: Deploy application with Docker Compose
  become: true
  tags:
    - app_deploy
    - compose
  block:
    - name: Login to Docker Hub
      community.docker.docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
        registry_url: https://index.docker.io/v1/
      no_log: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ web_app_compose_project_dir }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Template docker-compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ web_app_compose_project_dir }}/docker-compose.yml"
        mode: '0644'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Pull latest Docker image
      community.docker.docker_image:
        name: "{{ web_app_docker_image }}"
        tag: "{{ web_app_docker_tag }}"
        source: pull
        force_source: true

    - name: Deploy with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ web_app_compose_project_dir }}"
        state: present
        pull: always
        recreate: auto
      register: web_app_compose_output

    - name: Wait for application to be ready
      ansible.builtin.wait_for:
        host: localhost
        port: "{{ web_app_port }}"
        delay: 5
        timeout: 60
        state: started

    - name: Verify application health
      ansible.builtin.uri:
        url: "http://localhost:{{ web_app_port }}/health"
        method: GET
        status_code: 200
      register: web_app_health_check
      retries: 3
      delay: 5
      until: web_app_health_check.status == 200

    - name: Display deployment status
      ansible.builtin.debug:
        msg: "Application {{ web_app_name }} deployed successfully and is healthy"

  rescue:
    - name: Handle deployment failure
      ansible.builtin.debug:
        msg: "Deployment failed for {{ web_app_name }}. Check logs with: docker-compose -f {{ web_app_compose_project_dir }}/docker-compose.yml logs"

    - name: Show container status
      ansible.builtin.command: docker ps -a
      register: web_app_container_status
      changed_when: false

    - name: Display container status
      ansible.builtin.debug:
        var: web_app_container_status.stdout_lines

    - name: Fail the playbook
      ansible.builtin.fail:
        msg: "Application deployment failed"
