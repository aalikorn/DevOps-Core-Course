---
# Wipe logic for web application (Lab 6 Task 3)
# Double-gated: requires both variable AND tag

- name: Wipe web application
  become: true
  tags:
    - web_app_wipe
  when: web_app_wipe | default(false) | bool
  block:
    - name: Stop and remove containers with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ web_app_compose_project_dir }}"
        state: absent
      failed_when: false

    - name: Remove docker-compose file
      ansible.builtin.file:
        path: "{{ web_app_compose_project_dir }}/docker-compose.yml"
        state: absent

    - name: Remove application directory
      ansible.builtin.file:
        path: "{{ web_app_compose_project_dir }}"
        state: absent

    - name: Remove Docker images (optional)
      community.docker.docker_image:
        name: "{{ web_app_docker_image }}:{{ web_app_docker_tag }}"
        state: absent
      when: web_app_remove_images | default(false) | bool
      failed_when: false

    - name: Log wipe completion
      ansible.builtin.debug:
        msg: "Application {{ web_app_name }} wiped successfully at {{ ansible_date_time.iso8601 }}"
