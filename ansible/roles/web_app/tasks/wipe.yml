---
# Wipe logic for web application (Lab 6 Task 3)
# Double-gated: requires both variable AND tag

- name: Wipe web application
  block:
    - name: Stop and remove containers with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: absent
      ignore_errors: yes

    - name: Remove docker-compose file
      file:
        path: "{{ compose_project_dir }}/docker-compose.yml"
        state: absent

    - name: Remove application directory
      file:
        path: "{{ compose_project_dir }}"
        state: absent

    - name: Remove Docker images (optional)
      docker_image:
        name: "{{ docker_image }}:{{ docker_tag }}"
        state: absent
      ignore_errors: yes
      when: web_app_remove_images | default(false) | bool

    - name: Log wipe completion
      debug:
        msg: "Application {{ app_name }} wiped successfully at {{ ansible_date_time.iso8601 }}"

  when: web_app_wipe | default(false) | bool
  become: true
  tags:
    - web_app_wipe
