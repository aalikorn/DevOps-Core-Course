---
- name: Create monitoring directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ monitoring_dir }}"
    - "{{ monitoring_dir }}/loki"
    - "{{ monitoring_dir }}/promtail"
    - "{{ monitoring_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_dir }}/grafana/dashboards"

- name: Template Loki config
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "{{ monitoring_dir }}/loki/config.yml"
    mode: '0644'

- name: Template Promtail config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ monitoring_dir }}/promtail/config.yml"
    mode: '0644'

- name: Template Grafana Loki datasource
  ansible.builtin.template:
    src: loki.yaml.j2
    dest: "{{ monitoring_dir }}/grafana/provisioning/datasources/loki.yaml"
    mode: '0644'

- name: Template Grafana dashboards provisioning
  ansible.builtin.template:
    src: dashboards.yaml.j2
    dest: "{{ monitoring_dir }}/grafana/provisioning/dashboards/dashboards.yaml"
    mode: '0644'

- name: Template Grafana logs dashboard
  ansible.builtin.template:
    src: logs.json.j2
    dest: "{{ monitoring_dir }}/grafana/dashboards/logs.json"
    mode: '0644'

- name: Template docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_dir }}/docker-compose.yml"
    mode: '0644'
