---
monitoring_dir: "/home/{{ ansible_user }}/monitoring"

loki_version: "3.0.0"
loki_port: 3100
loki_retention: "168h"
loki_schema: "v13"
loki_cpu_limit: '1.0'
loki_mem_limit: '1G'

promtail_version: "3.0.0"
promtail_port: 9080
promtail_cpu_limit: '0.5'
promtail_mem_limit: '512M'

grafana_version: "11.3.0"
grafana_port: 3000
grafana_admin_user: "admin"
grafana_admin_password: "admin_password"
grafana_anonymous_enabled: "false"
grafana_cpu_limit: '1.0'
grafana_mem_limit: '1G'
