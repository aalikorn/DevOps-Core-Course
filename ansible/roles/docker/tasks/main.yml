---
# Docker role - Docker installation with blocks and tags (Lab 6 Task 1)

- name: Install Docker prerequisites
  block:
    - name: Install Docker dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
        keyring: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

  rescue:
    - name: Handle GPG key failure
      debug:
        msg: "GPG key addition failed, retrying after delay..."

    - name: Wait before retry
      pause:
        seconds: 10

    - name: Retry apt update
      apt:
        update_cache: yes

    - name: Retry Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
        keyring: /etc/apt/keyrings/docker.gpg

  become: true
  tags:
    - docker_install
    - docker

- name: Install Docker packages
  block:
    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Install Python Docker library
      pip:
        name:
          - docker
          - docker-compose
        state: present

  rescue:
    - name: Handle Docker installation failure
      debug:
        msg: "Docker installation failed, check logs"

  always:
    - name: Ensure Docker service is enabled and started
      service:
        name: docker
        state: started
        enabled: yes

  become: true
  tags:
    - docker_install
    - docker

- name: Configure Docker
  block:
    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes
      notify: restart docker

    - name: Create Docker daemon configuration
      copy:
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
        dest: /etc/docker/daemon.json
        mode: '0644'
      notify: restart docker

  rescue:
    - name: Handle Docker configuration failure
      debug:
        msg: "Docker configuration failed, using defaults"

  always:
    - name: Log Docker installation completion
      copy:
        content: "Docker installed and configured at {{ ansible_date_time.iso8601 }}"
        dest: /tmp/docker_installation_completion.log
        mode: '0644'

  become: true
  tags:
    - docker_config
    - docker
